<svg width="1500" height="340" viewBox="0 0 1500 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="45%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6a00"/>
      <stop offset="50%" stop-color="#ee0979"/>
      <stop offset="100%" stop-color="#8e2de2"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1500" height="340" fill="url(#bg)"/>

  <g opacity="0.15">
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff"/>
    </pattern>
    <rect width="1500" height="340" fill="url(#dots)"/>
  </g>

  <g transform="translate(1120,60)" opacity="0.9">
    <path d="M0,120 C60,20 160,20 220,90 C260,140 320,40 380,70" fill="none" stroke="url(#accent2)" stroke-width="3"/>
    <circle cx="0" cy="120" r="7" fill="#4facfe"/>
    <circle cx="220" cy="90" r="7" fill="#4facfe"/>
    <circle cx="380" cy="70" r="7" fill="#4facfe"/>
    <circle cx="0" cy="120" r="14" fill="none" stroke="#4facfe" stroke-width="1.5"/>
    <circle cx="220" cy="90" r="14" fill="none" stroke="#4facfe" stroke-width="1.5"/>
  </g>

  <text x="1160" y="270" font-family="Consolas, 'Courier New', monospace" font-size="120" fill="url(#accent)" opacity="0.85" filter="url(#glow)">&lt;/&gt;</text>

  <text x="80" y="150" font-family="Segoe UI, Verdana, sans-serif" font-size="58" font-weight="700" fill="#ffffff" filter="url(#glow)">
    FORTINA LUMBAN GAOL
  </text>

  <text x="80" y="200" font-family="Segoe UI, Verdana, sans-serif" font-size="26" fill="#c9c9e8">
    Computer Science Student  ·  Design × Code
  </text>
  <rect x="80" y="215" width="430" height="5" rx="2.5" fill="url(#accent)"/>

  <g font-family="Segoe UI, Verdana, sans-serif" font-size="18" fill="#0f0c29" font-weight="600">
    <rect x="80" y="245" width="90" height="34" rx="17" fill="#F24E1E"/>
    <text x="103" y="268">Figma</text>

    <rect x="182" y="245" width="105" height="34" rx="17" fill="#EA7600"/>
    <text x="203" y="268">Blender</text>

    <rect x="299" y="245" width="95" height="34" rx="17" fill="#3776AB"/>
    <text x="317" y="268" fill="#ffffff">Python</text>

    <rect x="406" y="245" width="105" height="34" rx="17" fill="#61DAFB"/>
    <text x="425" y="268">React</text>

    <rect x="523" y="245" width="90" height="34" rx="17" fill="#777BB4"/>
    <text x="543" y="268" fill="#ffffff">PHP</text>
  </g>
</svg>
